name: CI

on:
    push:
        branches:
            - main
            - master
            - "**"
    pull_request:

jobs:
    lint-build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Build
              run: npm run build

    docker-build:
        runs-on: ubuntu-latest
        needs: lint-build

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build production image
              run: docker build --target production -t the-bazaar:ci .
